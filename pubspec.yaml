name: liquid_kit
description: >
  Apple iOS 26 Liquid Glass UI kit for Flutter — spring-physics navigation bar,
    glass buttons, toolbar, search bar and shape primitives with iridescent
    long-press effects and gyroscope speculars.
version: 0.1.2
homepage: https://github.com/nedbaynepowell/liquid-kit

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
